name: Log Repository Traffic

on:
  schedule:
    # Spustí se každý den v 5:00 ráno UTC
    - cron: '0 5 * * *'
  workflow_dispatch: # Umožní ti to spustit i ručně přes tlačítko

permissions:
  contents: write # Nutné, aby bot mohl zapsat CSV zpět do repozitáře

jobs:
  update-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repozitáře
        uses: actions/checkout@v4

      - name: Nastavení Pythonu
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalace knihoven
        run: pip install requests

      - name: Spuštění stahovacího skriptu
        env:
          TRAFFIC_TOKEN: ${{ secrets.TRAFFIC_TOKEN }}
        run: python traffic_logger.py

      - name: Uložení a push do repozitáře
        run: |
          git config --global user.name "GitHub Action Bot"
          git config --global user.email "action@github.com"
          git add traffic_data.csv
          git commit -m "Automatický log traffic dat [skip ci]" || exit 0
          git push
